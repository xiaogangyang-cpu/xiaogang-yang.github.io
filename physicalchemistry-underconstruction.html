<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>虚拟工坊·物理化学PBL项目式学习导航</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0a192f;
            --card-bg: rgba(255, 255, 255, 0.07);
            --border-blue: rgba(100, 255, 218, 0.4);
            --accent-gold: #ffd166;
            --text-main: #e6f1ff;
            --text-dim: #94a3b8;
            --level1-color: #5eead4;
            --level2-color: #38bdf8;
            --level3-color: #a78bfa;
            --success-color: #10b981;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: radial-gradient(ellipse at top, #0f2748, var(--bg-dark) 70%);
            color: var(--text-main);
            min-height: 100vh;
        }

        header {
            padding: 10px 20px 10px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(10, 25, 47, 0.9), transparent);
            position: relative;
        }
        header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 10%;
            right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-blue), transparent);
        }
        header h1 {
            font-size: 2.8em;
            margin-bottom: 15px;
            background: linear-gradient(90deg, var(--level1-color), var(--level2-color), var(--level3-color));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        header p {
            color: var(--text-dim);
            max-width: 900px;
            margin: 0 auto;
            line-height: 1.7;
            font-size: 1.1em;
        }

        .level-legend {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 25px;
            font-size: 0.9em;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }

        .map-grid {
            display: grid;
            grid-template-columns: 250px repeat(3, 1fr);
            gap: 20px;
            padding: 40px;
            max-width: 1600px;
            margin: 10px auto 0;
        }

        /* 轴标题样式调整：允许换行，去掉nowrap */
        .axis {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 600;
            color: #cbd5e1;
            padding: 20px 15px;
            line-height: 1.5;
            backdrop-filter: blur(10px);
            font-size: 1.05em;
        }
        .axis-title {
            font-size: 1.3em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #fff;
            white-space: normal;        /* 允许换行 */
            word-break: break-word;
        }
        .axis-title .level-text {
            font-weight: bold;
            margin: 0 5px;
        }
        .axis.level1 { color: var(--level1-color); border-color: rgba(94, 234, 212, 0.3); }
        .axis.level2 { color: var(--level2-color); border-color: rgba(56, 189, 248, 0.3); }
        .axis.level3 { color: var(--level3-color); border-color: rgba(167, 139, 250, 0.3); }

        .node {
            position: relative;
            background: var(--card-bg);
            border: 1px solid var(--border-blue);
            border-radius: 18px;
            padding: 20px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(5px);
            min-height: auto;
            display: flex;
            flex-direction: column;
        }
        .map-grid > .node:nth-child(4n+2) {
            border-color: rgba(94, 234, 212, 0.5);
            box-shadow: 0 8px 25px rgba(94, 234, 212, 0.1);
        }
        .map-grid > .node:nth-child(4n+3) {
            border-color: rgba(56, 189, 248, 0.5);
            box-shadow: 0 8px 25px rgba(56, 189, 248, 0.1);
        }
        .map-grid > .node:nth-child(4n+4) {
            border-color: rgba(167, 139, 250, 0.5);
            box-shadow: 0 8px 25px rgba(167, 139, 250, 0.1);
        }
        .node:hover {
            border-color: var(--accent-gold);
            background: rgba(255, 209, 102, 0.05);
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .node-header {
            display: flex;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        .node-icon {
            font-size: 2em;
            margin-right: 12px;
            flex-shrink: 0;
            line-height: 1;
        }
        .map-grid > .node:nth-child(4n+2) .node-icon { color: var(--level1-color); }
        .map-grid > .node:nth-child(4n+3) .node-icon { color: var(--level2-color); }
        .map-grid > .node:nth-child(4n+4) .node-icon { color: var(--level3-color); }
        .node-title {
            margin: 0;
            font-size: 1.15em;
            color: #fff;
            line-height: 1.3;
        }
        .node-title .level-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.65em;
            font-weight: bold;
            margin-left: 10px;
            vertical-align: middle;
        }
        .level1-tag { background-color: rgba(94, 234, 212, 0.15); color: var(--level1-color); }
        .level2-tag { background-color: rgba(56, 189, 248, 0.15); color: var(--level2-color); }
        .level3-tag { background-color: rgba(167, 139, 250, 0.15); color: var(--level3-color); }

        .node-links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .node a {
            display: flex;
            align-items: center;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9em;
            padding: 10px 12px;
            border-radius: 10px;
            transition: all 0.25s ease;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid transparent;
            flex: 1 0 calc(50% - 5px);
            min-width: 0;
            box-sizing: border-box;
        }
        .node a:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateX(3px);
        }
        .node a i, .node a .material-icons-round {
            margin-right: 8px;
            font-size: 1em;
            width: 18px;
            text-align: center;
            flex-shrink: 0;
        }
        .map-grid > .node:nth-child(4n+2) a i,
        .map-grid > .node:nth-child(4n+2) a .material-icons-round { color: var(--level1-color); }
        .map-grid > .node:nth-child(4n+3) a i,
        .map-grid > .node:nth-child(4n+3) a .material-icons-round { color: var(--level2-color); }
        .map-grid > .node:nth-child(4n+4) a i,
        .map-grid > .node:nth-child(4n+4) a .material-icons-round { color: var(--level3-color); }

        .suggestion-box {
            position: absolute;
            bottom: calc(100% + 15px);
            left: 50%;
            transform: translateX(-50%) scale(0.95);
            width: 320px;
            background: #1e293b;
            border: 1px solid var(--accent-gold);
            border-radius: 12px;
            padding: 20px;
            visibility: hidden;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }
        .node:hover .suggestion-box {
            visibility: visible;
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }
        .suggestion-box::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border-width: 8px;
            border-style: solid;
            border-color: var(--accent-gold) transparent transparent transparent;
        }
        .sug-header {
            font-size: 0.9em;
            color: var(--accent-gold);
            font-weight: bold;
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 209, 102, 0.3);
        }
        .sug-header i {
            margin-right: 8px;
        }
        .sug-item {
            font-size: 0.88em;
            margin-bottom: 10px;
            line-height: 1.5;
            display: flex;
            gap: 10px;
            color: #e2e8f0;
        }
        .sug-dot {
            color: var(--accent-gold);
            flex-shrink: 0;
            font-size: 0.8em;
            margin-top: 4px;
        }

        .full-row {
            grid-column: 2 / span 3;
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(59, 130, 246, 0.1));
            border: 2px dashed var(--success-color);
            border-radius: 18px;
            min-height: auto;
        }
        .full-row:hover {
            border-style: solid;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.15), rgba(59, 130, 246, 0.15));
        }
        .full-row .node-title {
            color: var(--success-color);
            font-size: 1.5em;
            margin-bottom: 20px;
        }
        .full-row .node-links {
            flex-direction: row;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .full-row a {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-weight: 500;
            min-width: 180px;
            justify-content: center;
            flex: none;
            width: auto;
        }
        .full-row a:hover {
            background: var(--success-color);
            color: #0a192f;
        }

        footer {
            text-align: center;
            padding: 50px 20px;
            color: #64748b;
            font-size: 0.9em;
            margin-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        @media (max-width: 1400px) {
            .map-grid { grid-template-columns: 220px repeat(3, 1fr); gap: 18px; padding: 30px; }
        }
        @media (max-width: 1200px) {
            .map-grid { grid-template-columns: 200px repeat(3, 1fr); gap: 16px; }
            header h1 { font-size: 2.4em; }
        }
        @media (max-width: 992px) {
            .map-grid { grid-template-columns: 180px repeat(3, 1fr); gap: 14px; padding: 25px; }
            .node a { flex: 1 0 100%; }
            .axis-title { font-size: 1.1em; }
        }
    </style>
</head>
<body>
    <header>
        <h1><i class="fas fa-project-diagram"></i> 虚拟工坊：物理化学PBL上机实践</h1>
        <p>鼠标悬停任意模拟器卡片，查看核心理论背景。点击“启动模拟器”在新标签页打开对应仿真页面。</p>
    </header>

    <!-- 网格容器：表头静态，PBL行通过JS动态生成，最后保留全宽模块 -->

            </div>

                            "系统响应速度：冷启动时间、功率爬坡率。",
                            "储能或电网交互平滑输入，优化电解槽运行区间。"
                        ]
                    ]
                },
                {
                    name: "PBL 7：浆料稳定性与涂敷",
                    icon: "fa-flask",
                    sims: [
                        "胶体结构与界面电荷理论模拟器",
                        "表面电荷调控与粒子稳定性模拟器",
                        "浆料聚集体不均与涂敷问题模拟器"
                    ],
                    theories: [
                        [
                            "DLVO理论：胶体稳定性由范德华吸引与双电层排斥平衡。",
                            "Zeta电位表征颗粒表面电荷，影响分散性。",
                            "pH、盐浓度改变双电层厚度，导致絮凝或分散。"
                        ],
                        [
                            "调节pH或添加分散剂改变表面电荷，提高稳定性。",
                            "静电稳定与空间位阻稳定；聚合物吸附层防团聚。",
                            "流变性：剪切稀化利于涂敷，触变性影响静置沉降。"
                        ],
                        [
                            "聚集导致涂敷条纹、颗粒凸起，影响电极均匀性。",
                            "沉降速度由Stokes公式决定；粒径、密度差、粘度影响。",
                            "涂敷工艺参数：刮刀间隙、基材速度、干燥速率调控膜厚。"
                        ]
                    ]
                },
                {
                    name: "PBL 8：电解液水含量与失效机理",
                    icon: "fa-vial",
                    sims: [
                        "0-3级反应动力学调控模拟器",
                        "电解液降解活化能动力学模拟器",
                        "电池寿命预测工程化学动力学模拟器"
                    ],
                    theories: [
                        [
                            "反应级数n：速率r=k[A]ⁿ；水含量影响反应路径。",
                            "微量水引发LiPF₆水解产生HF，为准一级反应。",
                            "温度影响速率常数（Arrhenius公式），调控水含量抑制副反应。"
                        ],
                        [
                            "活化能Ea决定温度敏感性；Ea越高，温度影响越大。",
                            "阿伦尼乌斯外推寿命；水分加速降解降低活化能。",
                            "SEI膜形成与分解动力学，水分促进气体产生。"
                        ],
                        [
                            "容量衰减模型：基于副反应消耗锂，如溶剂氧化。",
                            "经验模型：指数或幂律关系，结合Arrhenius温度修正。",
                            "机械应力、析锂等物理过程耦合化学动力学预测寿命。"
                        ]
                    ]
                }
            ];

            const grid = document.getElementById('pblGrid');

            // 循环创建8行 (每个PBL)
            pblData.forEach((pbl, idx) => {
                // 1. 创建左侧轴 (PBL名称)
                const axisDiv = document.createElement('div');
                axisDiv.className = 'axis';
                axisDiv.innerHTML = `
                    <span class="axis-title">
                        <i class="fas ${pbl.icon}"></i> ${pbl.name}
                    </span>
                `;
                grid.appendChild(axisDiv);

                // 2. 创建三个节点 (对应三个模拟器)
                for (let j = 0; j < 3; j++) {
                    const node = document.createElement('div');
                    node.className = 'node';

                    // 根据列确定level标签颜色 (j=0→Lv.1, j=1→Lv.2, j=2→Lv.3)
                    const levelTagClass = j === 0 ? 'level1-tag' : (j === 1 ? 'level2-tag' : 'level3-tag');
                    const levelText = j === 0 ? '基础' : (j === 1 ? '分析' : '决策');
                    
                    // 节点图标: 第一列用fa-microscope等略作区分
                    let iconHtml = '';
                    if (j === 0) iconHtml = '<span class="node-icon fas fa-microscope"></span>';
                    else if (j === 1) iconHtml = '<span class="node-icon fas fa-chart-pie"></span>';
                    else iconHtml = '<span class="node-icon fas fa-sliders-h"></span>';

                    // 模拟器标题
                    const simTitle = pbl.sims[j];

                    // 理论背景数组 (三条)
                    const theoryItems = pbl.theories[j] || [
                        "热力学基本定律应用",
                        "参数影响分析",
                        "优化策略探讨"
                    ];  // 后备理论(几乎不会触发)

                    // 构建node内部HTML (包含标题、链接、悬浮框理论)
                    node.innerHTML = `
                        <div class="node-header">
                            ${iconHtml}
                            <h3 class="node-title">${simTitle} <span class="level-tag ${levelTagClass}">${levelText}</span></h3>
                        </div>
                        <div class="node-links">
                            <a href="pbl${idx+1}_sim${j+1}.html" target="_blank"><i class="fas fa-play"></i> 启动模拟器</a>
                            <a href="#"><i class="fas fa-book-open"></i> 理论背景</a>
                        </div>
                        <div class="suggestion-box">
                            <span class="sug-header"><i class="fas fa-lightbulb"></i> 核心理论</span>
                            <div class="sug-item"><span class="sug-dot">▶</span><span>${theoryItems[0]}</span></div>
                            <div class="sug-item"><span class="sug-dot">▶</span><span>${theoryItems[1]}</span></div>
                            <div class="sug-item"><span class="sug-dot">▶</span><span>${theoryItems[2]}</span></div>
                        </div>
                    `;
                    grid.appendChild(node);
                }
            });

            // ----- 最后添加全宽“学习成果”模块 (与模板一致) -----
            const fullRow = document.createElement('div');
            fullRow.className = 'node full-row';
            fullRow.innerHTML = `
          
                </div>
                <div class="suggestion-box">
                    <span class="sug-header"><i class="fas fa-lightbulb"></i> 思维进阶建议</span>
                    <div class="sug-item"><span class="sug-dot">▶</span><span>回顾所有PBL，整合知识体系。</span></div>
                    <div class="sug-item"><span class="sug-dot">▶</span><span>分析自己的学习路径，优化后续计划。</span></div>
                    <div class="sug-item"><span class="sug-dot">▶</span><span>尝试将模拟分析应用于实际工程案例。</span></div>
                </div>
            `;
            grid.appendChild(fullRow);
        })();
    </script>
</body>
